<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>麻雀大会スコア入力</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .player-box { background: #fafafa; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        select, input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        select:disabled { background-color: #eee; cursor: wait; }
        button { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .disabled-opt { color: #999; background: #eee; }
        .error { color: #d93025; font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px; }
        #roundInfo { font-weight: bold; color: #1a73e8; margin-bottom: 10px; font-size: 1.1em; }
        #scoreStatus { background: #e8f0fe; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; text-align: left; color: #1a73e8; font-size: 0.95em; border-left: 5px solid #1a73e8; }
        .diff-plus { color: #d93025 !important; background: #fce8e6 !important; }
        .diff-minus { color: #1a73e8 !important; background: #e8f0fe !important; }
        .diff-ok { color: #2e7d32 !important; background: #e6f4ea !important; }
        h3 { font-size: 1em; color: #555; margin-bottom: 10px; border-left: 4px solid #1a73e8; padding-left: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>卓の選択</h2>
    <select id="tableSelect" onchange="initView()" disabled>
        <option value="">データ取得中...</option>
        <option value="A">A卓</option>
        <option value="B">B卓</option>
    </select>
    <div id="roundInfo"></div>

    <div id="stepMember" style="display:none;">
        <h3>対局メンバー選定</h3>
        <div id="memberSelects"></div>
        <button id="startBtn" onclick="startMatch()">対局開始（メンバー確定）</button>
    </div>

    <div id="stepScore" style="display:none;">
        <h3>スコア入力</h3>
        <div id="scoreStatus">合計: 0 / 100,000 (不足: 100,000)</div>
        <div id="scoreInputs"></div>
        <div id="status" class="error"></div>
        <button id="submitBtn" onclick="submitScores()">スコア送信</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw9-O0sEzbMnx8HF3ItlGEeiN_TsfN-kJwVLf_KOy7tVEQAh78oEEVsnt9IviyYmPYe/exec"; 
    let gData = {};
    const SEATS = ["東", "南", "西", "北"];

    window.onload = function() {
        fetchInitialData();
    };

    async function fetchInitialData(callback) {
        const tableSelect = document.getElementById('tableSelect');
        tableSelect.disabled = true;
        try {
            const response = await fetch(GAS_URL);
            gData = await response.json();
            tableSelect.disabled = false;
            tableSelect.options[0].text = "卓を選択してください";
            if(callback) callback();
        } catch (err) {
            alert("通信エラー: " + err);
        }
    }

    function resetUI() {
        document.getElementById('tableSelect').value = "";
        document.getElementById('roundInfo').textContent = "";
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'none';
        document.getElementById('status').textContent = "";
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('startBtn').disabled = false;
    }

    function initView() {
        const table = document.getElementById('tableSelect').value;
        const info = document.getElementById('roundInfo');
        const sMem = document.getElementById('stepMember');
        const sSco = document.getElementById('stepScore');
        if (!table) { sMem.style.display = 'none'; sSco.style.display = 'none'; info.textContent = ""; return; }

        const tableStatus = gData.tableStatus[table];
        if (tableStatus && tableStatus.players[0] !== "") {
            info.textContent = "第" + tableStatus.round + "回戦 対局中";
            showScoreInput(tableStatus.players);
        } else {
            const currentRound = gData.completedRounds[table] + 1;
            info.textContent = "第" + currentRound + "回戦 準備";
            showMemberSelect();
        }
    }

    function showMemberSelect() {
        document.getElementById('stepMember').style.display = 'block';
        document.getElementById('stepScore').style.display = 'none';
        const container = document.getElementById('memberSelects');
        container.innerHTML = "";
        SEATS.forEach(seat => {
            const div = document.createElement('div');
            div.className = "player-box";
            div.innerHTML = `<label>${seat}家</label><select class="p-name" onchange="syncSelects()"><option value="">選択してください</option></select>`;
            container.appendChild(div);
        });
        syncSelects();
    }

    function syncSelects() {
        const selects = document.querySelectorAll('.p-name');
        const busyInOtherTables = gData.busyPlayers || [];
        const selectedInCurrentTable = Array.from(selects).map(s => s.value).filter(v => v !== "");
        selects.forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">選択してください</option>';
            gData.playerNames.forEach(n => {
                if (!busyInOtherTables.includes(n) && (!selectedInCurrentTable.includes(n) || n === currentVal)) {
                    const opt = new Option(n, n);
                    if (n === currentVal) opt.selected = true;
                    sel.add(opt);
                }
            });
            gData.playerNames.forEach(n => {
                if (!busyInOtherTables.includes(n) && selectedInCurrentTable.includes(n) && n !== currentVal) {
                    const opt = new Option(n + " (選択中)", n);
                    opt.disabled = true; sel.add(opt);
                }
            });
            gData.playerNames.forEach(n => {
                if (busyInOtherTables.includes(n)) {
                    const opt = new Option(n + " (対局中)", n);
                    opt.disabled = true; sel.add(opt);
                }
            });
        });
    }

    function showScoreInput(players) {
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'block';
        const container = document.getElementById('scoreInputs');
        container.innerHTML = "";
        players.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = "player-box";
            div.innerHTML = `<label>${SEATS[i]}家: <b>${name}</b></label><input type="number" class="p-score" data-name="${name}" placeholder="素点" inputmode="numeric" oninput="calcTotal()">`;
            container.appendChild(div);
        });
        calcTotal();
    }

    function calcTotal() {
        const inputs = document.querySelectorAll('.p-score');
        let total = 0;
        inputs.forEach(i => total += (i.value === "" ? 0 : Number(i.value)));
        const diff = 100000 - total;
        const statusBox = document.getElementById('scoreStatus');
        let text = `合計: ${total.toLocaleString()} / 100,000`;
        if (diff > 0) { text += ` (不足: ${diff.toLocaleString()})`; statusBox.className = "diff-minus"; }
        else if (diff < 0) { text += ` (超過: ${Math.abs(diff).toLocaleString()})`; statusBox.className = "diff-plus"; }
        else { text += " (OK!)"; statusBox.className = "diff-ok"; }
        statusBox.textContent = text;
    }

    async function startMatch() {
        const table = document.getElementById('tableSelect').value;
        const names = Array.from(document.querySelectorAll('.p-name')).map(s => s.value);
        const btn = document.getElementById('startBtn');
        if (!gData.completedRounds) { alert("読み込み中です"); return; }
        const round = gData.completedRounds[table] + 1;
        if (names.includes("") || new Set(names).size !== 4) { alert("4名選んでください"); return; }
        btn.disabled = true;
        try {
            await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "commitMembers", tableName: table, roundNum: round, players: names })
            });
            fetchInitialData(() => { initView(); btn.disabled = false; alert("メンバー確定しました"); });
        } catch (err) { alert("確定エラー: " + err); btn.disabled = false; }
    }

    async function submitScores() {
        const btn = document.getElementById('submitBtn');
        const table = document.getElementById('tableSelect').value;
        const inputs = document.querySelectorAll('.p-score');
        const players = [];
        let total = 0;

        if (!gData.tableStatus || !gData.tableStatus[table]) {
            alert("データ同期エラー。再読み込みしてください。"); return;
        }

        for (let input of inputs) {
            const val = input.value === "" ? NaN : Number(input.value);
            if (isNaN(val)) { alert("未入力があります"); return; }
            players.push({ name: input.dataset.name, rawScore: val });
            total += val;
        }

        if (total !== 100000) {
            const diff = 100000 - total;
            alert("10万点になりません。\n" + (diff > 0 ? `${diff.toLocaleString()}点 不足` : `${Math.abs(diff).toLocaleString()}点 超過`));
            return;
        }

        if (!confirm("スコアを送信しますか？")) return;
        btn.disabled = true;
        const date = new Date().toISOString().slice(0,10).replace(/-/g, "");
        const round = gData.tableStatus[table].round;
        const matchId = date + "-" + String(round).padStart(2, '0') + "-" + table;

        try {
            const response = await fetch(GAS_URL, { 
                method: "POST", headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "processFromWeb", matchId: matchId, tableName: table + "卓", players: players })
            });
            alert("送信完了"); resetUI(); fetchInitialData();
        } catch (err) { alert("送信エラー: " + err); btn.disabled = false; }
    }
</script>
</body>
</html>
