<!DOCTYPE html>
<html lang="ja">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>麻雀大会スコア入力 (V12.0 API連携版)</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif; padding: 15px; background: #f0f2f5; color: #333; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .player-box { background: #fafafa; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #eee; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 1.4em; }
        h3 { font-size: 1em; color: #555; margin-bottom: 12px; border-left: 4px solid #1a73e8; padding-left: 8px; }
        select, input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        select:disabled { background-color: #eee; cursor: not-allowed; color: #888; }
        button { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #roundInfo { font-weight: bold; color: #1a73e8; margin-bottom: 15px; font-size: 1.1em; min-height: 1.5em; }
        #scoreStatus { background: #e8f0fe; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: left; color: #1a73e8; font-size: 0.95em; border-left: 5px solid #1a73e8; }
        .diff-plus { color: #d93025 !important; background: #fce8e6 !important; border-left-color: #d93025 !important; }
        .diff-minus { color: #1a73e8 !important; background: #e8f0fe !important; border-left-color: #1a73e8 !important; }
        .diff-ok { color: #2e7d32 !important; background: #e6f4ea !important; border-left-color: #2e7d32 !important; }
        .error-msg { color: #d93025; font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>卓の選択</h2>
    <select id="tableSelect" onchange="initView()" disabled>
        <option value="">データ取得中...</option>
        <option value="A">A卓</option>
        <option value="B">B卓</option>
    </select>
    <div id="roundInfo"></div>

    <div id="stepMember" style="display:none;">
        <h3>対局メンバー選定</h3>
        <div id="memberSelects"></div>
        <button id="startBtn" onclick="startMatch()">対局開始（メンバー確定）</button>
    </div>

    <div id="stepScore" style="display:none;">
        <h3>スコア入力</h3>
        <div id="scoreStatus">合計: 0 / 100,000 (不足: 100,000)</div>
        <div id="scoreInputs"></div>
        <div id="status" class="error-msg"></div>
        <button id="submitBtn" onclick="submitScores()">スコア送信</button>
    </div>
</div>

<script>
    // 【重要】ここにデプロイした最新のGASウェブアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyRmIsWptfSV_GraQOOT-SC8HLIfirXp2C_sFjzDJ9c28HAeDRRceH60cgqmvqwL7W7tw/exec"; 
    
    let gData = {};
    const SEATS = ["東", "南", "西", "北"];

    window.onload = function() {
        fetchInitialData();
    };

    /**
     * データ取得 (GET)
     * 通信遅延対策として物理ロックとデバッグログを強化
     */
    async function fetchInitialData(callback) {
        const tableSelect = document.getElementById('tableSelect');
        tableSelect.disabled = true;
        tableSelect.options[0].text = "データ取得中...";
        
        console.log("GAS通信開始...");

        try {
            const response = await fetch(GAS_URL);
            if (!response.ok) throw new Error(`HTTPエラー! ステータス: ${response.status}`);
            
            const data = await response.json();
            console.log("GASからのレスポンス内容:", data);

            gData = data;

            // データの準備が「完全に」整ってから解除
            tableSelect.options[0].text = "卓を選択してください";
            tableSelect.disabled = false;
            
            if(callback) callback();
        } catch (err) {
            console.error("fetchInitialDataエラー:", err);
            tableSelect.options[0].text = "通信エラーが発生しました";
            alert("GASからのデータ取得に失敗しました。URLの確認と再読み込みを行ってください。\n詳細: " + err);
        }
    }

    /**
     * 画面表示の初期化
     * エンジニア指摘: 通信完了前やデータ不備時のガード節を強化
     */
    function initView() {
        const tableSelect = document.getElementById('tableSelect');
        const table = tableSelect.value;
        const info = document.getElementById('roundInfo');
        const sMem = document.getElementById('stepMember');
        const sSco = document.getElementById('stepScore');

        // 【ガード節】gDataが未ロード、または通信エラー時は処理を中断
        if (!table || !gData || !gData.tableStatus) {
            console.warn("データが準備できていないため、処理を中断しました。");
            if (table) tableSelect.value = ""; // 選択を強制リセット
            sMem.style.display = 'none';
            sSco.style.display = 'none';
            info.textContent = "";
            return;
        }

        const tableStatus = gData.tableStatus[table];
        if (tableStatus && tableStatus.players[0] && tableStatus.players[0] !== "") {
            info.textContent = "第" + tableStatus.round + "回戦 対局中";
            showScoreInput(tableStatus.players);
        } else {
            const currentRound = (gData.completedRounds[table] || 0) + 1;
            info.textContent = "第" + currentRound + "回戦 準備";
            showMemberSelect();
        }
    }

    function showMemberSelect() {
        document.getElementById('stepMember').style.display = 'block';
        document.getElementById('stepScore').style.display = 'none';
        const container = document.getElementById('memberSelects');
        container.innerHTML = "";
        SEATS.forEach(seat => {
            const div = document.createElement('div');
            div.className = "player-box";
            div.innerHTML = `<label>${seat}家</label><select class="p-name" onchange="syncSelects()"><option value="">選択してください</option></select>`;
            container.appendChild(div);
        });
        syncSelects();
    }

    function syncSelects() {
        const selects = document.querySelectorAll('.p-name');
        const busyInOtherTables = gData.busyPlayers || [];
        const selectedInCurrentTable = Array.from(selects).map(s => s.value).filter(v => v !== "");
        
        selects.forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">選択してください</option>';
            gData.playerNames.forEach(n => {
                if (!busyInOtherTables.includes(n) && (!selectedInCurrentTable.includes(n) || n === currentVal)) {
                    const opt = new Option(n, n);
                    if (n === currentVal) opt.selected = true;
                    sel.add(opt);
                }
            });
            // 他の風で選択済みの人は無効化して表示
            gData.playerNames.forEach(n => {
                if (!busyInOtherTables.includes(n) && selectedInCurrentTable.includes(n) && n !== currentVal) {
                    const opt = new Option(n + " (選択中)", n);
                    opt.disabled = true; sel.add(opt);
                }
            });
            // 他の卓で対局中の人は無効化して表示
            gData.playerNames.forEach(n => {
                if (busyInOtherTables.includes(n)) {
                    const opt = new Option(n + " (対局中)", n);
                    opt.disabled = true; sel.add(opt);
                }
            });
        });
    }

    function showScoreInput(players) {
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'block';
        const container = document.getElementById('scoreInputs');
        container.innerHTML = "";
        players.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = "player-box";
            div.innerHTML = `<label>${SEATS[i]}家: <b>${name}</b></label><input type="number" class="p-score" data-name="${name}" placeholder="点数を入力" inputmode="numeric" oninput="calcTotal()">`;
            container.appendChild(div);
        });
        calcTotal();
    }

    function calcTotal() {
        const inputs = document.querySelectorAll('.p-score');
        let total = 0;
        inputs.forEach(i => total += (i.value === "" ? 0 : Number(i.value)));
        const diff = 100000 - total;
        const statusBox = document.getElementById('scoreStatus');
        let text = `合計: ${total.toLocaleString()} / 100,000`;
        if (diff > 0) { text += ` (不足: ${diff.toLocaleString()})`; statusBox.className = "diff-minus"; }
        else if (diff < 0) { text += ` (超過: ${Math.abs(diff).toLocaleString()})`; statusBox.className = "diff-plus"; }
        else { text += " (OK!)"; statusBox.className = "diff-ok"; }
        statusBox.textContent = text;
    }

    async function startMatch() {
        const table = document.getElementById('tableSelect').value;
        const names = Array.from(document.querySelectorAll('.p-name')).map(s => s.value);
        const btn = document.getElementById('startBtn');
        
        if (!gData.completedRounds) { alert("データ読み込み中です"); return; }
        const round = (gData.completedRounds[table] || 0) + 1;
        if (names.includes("") || new Set(names).size !== 4) { alert("4名選んでください"); return; }
        
        btn.disabled = true;
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "commitMembers", tableName: table, roundNum: round, players: names })
            });
            alert("メンバー確定しました");
            fetchInitialData(() => { initView(); btn.disabled = false; });
        } catch (err) {
            alert("確定エラー: " + err);
            btn.disabled = false;
        }
    }

    async function submitScores() {
        const btn = document.getElementById('submitBtn');
        const table = document.getElementById('tableSelect').value;
        const inputs = document.querySelectorAll('.p-score');
        const players = [];
        let total = 0;

        if (!gData.tableStatus || !gData.tableStatus[table]) {
            alert("同期エラー。再読み込みしてください。");
            return;
        }

        for (let input of inputs) {
            const val = input.value === "" ? NaN : Number(input.value);
            if (isNaN(val)) { alert("未入力のスコアがあります"); return; }
            players.push({ name: input.dataset.name, rawScore: val });
            total += val;
        }

        if (total !== 100000) {
            alert("合計が10万点になっていません。");
            return;
        }

        if (!confirm("スコアを送信しますか？")) return;

        btn.disabled = true;
        const date = new Date().toISOString().slice(0,10).replace(/-/g, "");
        const round = gData.tableStatus[table].round;
        const matchId = `${date}-${String(round).padStart(2, '0')}-${table}`;

        try {
            const response = await fetch(GAS_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "processFromWeb", matchId: matchId, tableName: table + "卓", players: players })
            });
            const resData = await response.json();
            if (resData.status === "error") throw new Error(resData.error);
            
            alert("送信完了しました！");
            resetUI();
            fetchInitialData();
        } catch (err) {
            alert("送信エラー: " + err);
            btn.disabled = false;
        }
    }

    function resetUI() {
        document.getElementById('tableSelect').value = "";
        document.getElementById('roundInfo').textContent = "";
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'none';
    }
</script>
</body>
</html>
