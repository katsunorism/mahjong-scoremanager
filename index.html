<!DOCTYPE html>
<html lang="ja">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>カテコミュ麻雀大会～みやーん杯～</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        .header-title { text-align: center; padding: 15px 10px; background: #1a73e8; color: white; font-size: 1.1em; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border-radius: 0 0 10px 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .player-box { background: #fafafa; padding: 8px; border-radius: 8px; border: 1px solid #eee; text-align: center; }
        .player-label { display: block; font-size: 0.9em; line-height: 1.4; margin-bottom: 5px; height: 1.5em; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        h3 { font-size: 1em; color: #555; margin-bottom: 12px; border-left: 4px solid #1a73e8; padding-left: 8px; margin-top: 0; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #scoreStatus { background: #e8f0fe; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: center; color: #1a73e8; border: 2px solid #1a73e8; font-weight: bold; font-size: 0.9em; }
        #scoreSub { font-size: 0.8em; display: block; margin-top: 2px; }
        .diff-minus { color: #1a73e8 !important; background: #e8f0fe !important; border-color: #1a73e8 !important; }
        .diff-plus { color: #d93025 !important; background: #fce8e6 !important; border-color: #d93025 !important; }
        .diff-ok { color: #2e7d32 !important; background: #e6f4ea !important; border-color: #2e7d32 !important; }
        
        /* 外部リンクボタン用エリア */
        .link-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 500px;
            margin: 25px auto 10px auto;
        }
        .external-link { 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9em; 
            color: #1a73e8; 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid #1a73e8; 
            padding: 12px 5px; 
            border-radius: 8px; 
            background: white; 
        }
    </style>
</head>
<body>
<div class="header-title">カテコミュ麻雀大会～みやーん杯～</div>
<div class="card">
    <select id="tableSelect" onchange="initView()" disabled style="margin-bottom:15px;">
        <option value="">データ取得中...</option>
        <option value="A">A卓</option>
        <option value="B">B卓</option>
    </select>
    <div id="stepMember" style="display:none;">
        <h3>メンバー選定</h3>
        <div id="memberSelects" style="margin-bottom:10px;"></div>
        <button id="startBtn" onclick="startMatch()">対局開始</button>
    </div>
    <div id="stepScore" style="display:none;">
        <div id="scoreStatus">
            <span id="scoreMain">合計: 0</span>
            <span id="scoreSub"></span>
        </div>
        <button id="submitBtn" onclick="submitScores()" style="margin-bottom:15px;">スコア送信</button>
        <div id="scoreInputs" class="score-grid"></div>
    </div>
</div>

<div class="link-container">
    <a href="https://docs.google.com/spreadsheets/d/1OlJXvpZezA6bFdD9gqIrBR6ZBkb9MaXYQ6hl_eT-dq4/edit#gid=1001959891" target="_blank" class="external-link">スコア表を見る</a>
    <a href="https://docs.google.com/spreadsheets/d/1OlJXvpZezA6bFdD9gqIrBR6ZBkb9MaXYQ6hl_eT-dq4/edit?gid=1215317715#gid=1215317715" target="_blank" class="external-link">ルール確認</a>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyRmIsWptfSV_GraQOOT-SC8HLIfirXp2C_sFjzDJ9c28HAeDRRceH60cgqmvqwL7W7tw/exec"; 
    let gData = {};
    window.onload = function() { fetchInitialData(); };
    async function fetchInitialData(callback) {
        const sel = document.getElementById('tableSelect');
        try {
            const res = await fetch(GAS_URL);
            gData = await res.json();
            sel.options[0].text = "卓を選択してください";
            sel.disabled = false;
            if(callback) callback();
        } catch (e) { alert("通信エラー"); }
    }
    function initView() {
        const table = document.getElementById('tableSelect').value;
        const sMem = document.getElementById('stepMember');
        const sSco = document.getElementById('stepScore');
        if (!table || !gData.tableStatus) { sMem.style.display='none'; sSco.style.display='none'; return; }
        const status = gData.tableStatus[table];
        if (status && status.players[0]) { showScoreInput(status.players); } 
        else { showMemberSelect(); }
    }
    function showMemberSelect() {
        document.getElementById('stepMember').style.display = 'block';
        document.getElementById('stepScore').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        const container = document.getElementById('memberSelects');
        container.innerHTML = "";
        const SEATS = ["東", "南", "西", "北"];
        SEATS.forEach(seat => {
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            div.innerHTML = `<label style="font-size:0.85em; font-weight:bold;">${seat}家</label><select class="p-name" onchange="syncSelects()"><option value="">選択</option></select>`;
            container.appendChild(div);
        });
        syncSelects();
    }
    function syncSelects() {
        const selects = document.querySelectorAll('.p-name');
        const busy = gData.busyPlayers || [];
        const selected = Array.from(selects).map(s => s.value).filter(v => v !== "");
        selects.forEach(sel => {
            const cur = sel.value; sel.innerHTML = '<option value="">選択</option>';
            gData.playerNames.forEach(n => {
                if (!busy.includes(n) && (!selected.includes(n) || n === cur)) {
                    const opt = new Option(n, n); if (n === cur) opt.selected = true; sel.add(opt);
                }
            });
        });
    }
    function showScoreInput(players) {
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
        const container = document.getElementById('scoreInputs');
        container.innerHTML = ""; 
        players.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = "player-box";
            const label = document.createElement('span');
            label.className = "player-label";
            label.textContent = name;
            const input = document.createElement('input');
            input.type = "number";
            input.className = "p-score";
            input.setAttribute('data-name', name);
            input.setAttribute('inputmode', 'numeric');
            input.placeholder = "0";
            input.oninput = calcTotal;
            div.appendChild(label); div.appendChild(input);
            container.appendChild(div);
        });
        calcTotal();
    }
    function calcTotal() {
        const inputs = document.querySelectorAll('.p-score');
        let total = 0;
        inputs.forEach(i => total += (i.value === "" ? 0 : Number(i.value)));
        const diff = 100000 - total;
        const main = document.getElementById('scoreMain'), sub = document.getElementById('scoreSub'), statusBox = document.getElementById('scoreStatus');
        main.textContent = `合計: ${total.toLocaleString()}`;
        if (diff > 0) { sub.textContent = `(不足: ${diff.toLocaleString()})`; statusBox.className = "diff-minus"; }
        else if (diff < 0) { sub.textContent = `(超過: ${Math.abs(diff).toLocaleString()})`; statusBox.className = "diff-plus"; }
        else { main.textContent = `合計: 100,000 (OK!)`; sub.textContent = ""; statusBox.className = "diff-ok"; }
    }
    async function startMatch() {
        const table = document.getElementById('tableSelect').value;
        const names = Array.from(document.querySelectorAll('.p-name')).map(s => s.value);
        if (names.includes("")) return alert("4名選んでください");
        const btn = document.getElementById('startBtn'); btn.disabled = true;
        try {
            await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "commitMembers", tableName: table, roundNum: (gData.completedRounds[table] || 0) + 1, players: names }) });
            fetchInitialData(() => initView());
        } catch (e) { alert("確定エラー"); btn.disabled = false; }
    }
    async function submitScores() {
        const btn = document.getElementById('submitBtn');
        const table = document.getElementById('tableSelect').value;
        const inputs = document.querySelectorAll('.p-score');
        const players = []; let total = 0;
        for (let input of inputs) {
            const val = input.value === "" ? NaN : Number(input.value);
            if (isNaN(val)) return alert("未入力があります");
            players.push({ name: input.getAttribute('data-name'), rawScore: val });
            total += val;
        }
        if (total !== 100000) return alert("100,000点にしてください");
        if (!confirm("送信しますか？")) return;
        btn.disabled = true;
        const date = new Date().toISOString().slice(0,10).replace(/-/g, "");
        const matchId = `${date}-${String(gData.tableStatus[table].round).padStart(2, '0')}-${table}`;
        try {
            await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "processFromWeb", matchId: matchId, tableName: table + "卓", players: players }) });
            alert("送信完了！"); resetUI(); fetchInitialData();
        } catch (e) { alert("送信エラー"); btn.disabled = false; }
    }
    function resetUI() {
        document.getElementById('tableSelect').value = "";
        document.getElementById('stepMember').style.display = 'none';
        document.getElementById('stepScore').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('startBtn').disabled = false;
    }
</script>
</body>
</html>
